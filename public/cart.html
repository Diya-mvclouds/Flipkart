<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Flipkart</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f1f3f6;
            min-height: 100vh;
        }

        .header {
            background: #2874f0;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo img {
            height: 25px;
            filter: brightness(0) invert(1);
            cursor: pointer;
        }

        .cart-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .cart-items {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .cart-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .cart-item {
            display: flex;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            gap: 16px;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #212121;
        }

        .item-brand {
            font-size: 12px;
            color: #878787;
            margin-bottom: 10px;
        }

        .item-price {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .current-price {
            font-size: 18px;
            font-weight: 700;
        }

        .original-price {
            font-size: 14px;
            color: #878787;
            text-decoration: line-through;
        }

        .discount {
            color: #00b85c;
            font-size: 14px;
            font-weight: 600;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .qty-btn:hover {
            background: #f1f3f6;
        }

        .qty-value {
            font-size: 16px;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .remove-btn {
            color: #ff6161;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .remove-btn:hover {
            text-decoration: underline;
        }

        .cart-summary {
            position: sticky;
            top: 20px;
        }

        .summary-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .summary-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .summary-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #878787;
            text-transform: uppercase;
        }

        .summary-body {
            padding: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .summary-row.total {
            padding-top: 12px;
            border-top: 1px dashed #e0e0e0;
            font-size: 18px;
            font-weight: 700;
            margin-top: 16px;
        }

        .checkout-btn {
            width: 100%;
            background: #ff9f00;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            background: #e68a00;
        }

        .checkout-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-cart img {
            width: 200px;
            margin-bottom: 20px;
        }

        .empty-cart h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: #878787;
            margin-bottom: 20px;
        }

        .shop-btn {
            background: #2874f0;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
            }

            .cart-item {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .quantity-controls {
                justify-content: center;
            }

            .remove-btn {
                margin-left: 0;
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/fkheaderlogo_exploreplus-44005d.svg" alt="Flipkart" onclick="window.location.href='index.html'">
        </div>
        <div style="color: white; font-weight: 600;">
            <i class="fas fa-shopping-cart"></i> My Cart
        </div>
    </header>

    <div class="cart-container">
        <div class="cart-items" id="cartItems">
            <div class="cart-header">
                <h2>My Cart (<span id="itemCount">0</span> items)</h2>
            </div>
            <div id="cartItemsList" class="loading">
                <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: #2874f0;"></i>
            </div>
        </div>

        <div class="cart-summary">
            <div class="summary-card">
                <div class="summary-header">
                    <h3>Price Details</h3>
                </div>
                <div class="summary-body">
                    <div class="summary-row">
                        <span>Price (<span id="totalItems">0</span> items)</span>
                        <span id="originalTotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Discount</span>
                        <span style="color: #00b85c;" id="totalDiscount">- ₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Charges</span>
                        <span style="color: #00b85c;">FREE</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total Amount</span>
                        <span id="grandTotal">₹0</span>
                    </div>
                    <button class="checkout-btn" id="checkoutBtn" onclick="proceedToCheckout()">
                        PROCEED TO CHECKOUT
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
       const API_URL = window.location.hostname.includes('localhost')
            ? 'http://localhost:3000/api'
            : 'https://flipkart1-0xel.onrender.com/api';

        document.addEventListener("DOMContentLoaded", function () {
            const token = localStorage.getItem("token");
        
            if (!token) {
                window.location.href = "login.html";
                return;
            }
        
            loadCart();
        
        });
        
        async function loadCart(){
            const token=localStorage.getItem("token");
            try{    
            const res=await fetch(`${API_URL}/cart`,{
            headers:{Authorization:`Bearer ${token}`}
            });
            
            const data=await res.json();
            
            if(data.success){
                renderCart(
                data.cartItems || [],
                data.pricing || {totalMrp:0,totalDiscount:0,finalAmount:0}
                );
            }
            
            }catch(err){
                console.error(err);
            }        
        }
        
        function renderCart(items,pricing){
        
        const list=document.getElementById("cartItemsList");
        
        if(items.length===0){
        
        list.innerHTML="<p>Your cart is empty</p>";
        return;
        
        }
        
        let html="";
        
        items.forEach(item=>{
        
        const price=item.discount_price || item.price;
        
        html+=`
        
        <div class="cart-item">
        
        <img src="${item.image_url}" class="item-image">
        
        <div>
        
        <h4>${item.name}</h4>
        
        <div>₹${price}</div>
        
        <div class="quantity-controls">
        
        <button class="qty-btn" onclick="updateQuantity(${item.cart_id},${item.quantity-1})">-</button>
        
        <span>${item.quantity}</span>
        
        <button class="qty-btn" onclick="updateQuantity(${item.cart_id},${item.quantity+1})">+</button>
        
        <span class="remove-btn" onclick="removeItem(${item.cart_id})">Remove</span>
        
        </div>
        
        </div>
        
        </div>
        
        `;
        
        });
        
        list.innerHTML=html;
        
        const itemCount=items.reduce((s,i)=>s+i.quantity,0);
        
        document.getElementById("itemCount").textContent=itemCount;
        document.getElementById("totalItems").textContent=itemCount;
        
        document.getElementById("originalTotal").textContent="₹"+(pricing.totalMrp||0);
        document.getElementById("totalDiscount").textContent="- ₹"+(pricing.totalDiscount||0);
        document.getElementById("grandTotal").textContent="₹"+(pricing.finalAmount||0);
        
        }
        
        async function updateQuantity(cartId,quantity){
        
        if(quantity<1){
        removeItem(cartId);
        return;
        }
        
        const token=localStorage.getItem("token");
        
        try{
        
        const res=await fetch(`${API_URL}/cart/update`,{
        
        method:"PUT",
        
        headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
        },
        
        body:JSON.stringify({cartId,quantity})
        
        });
        
        const data=await res.json();
        
        if(data.success){
        
        renderCart(
        data.cartItems || [],
        data.pricing || {totalMrp:0,totalDiscount:0,finalAmount:0}
        );
        
        }
        
        }catch(err){
        
        console.error(err);
        
        }
        
        }
        
        async function removeItem(cartId){
        
            if(!confirm("Remove item?")) return;
            
            const token=localStorage.getItem("token");
            
            try{        
                const res=await fetch(`${API_URL}/cart/remove/${cartId}`,{        
                method:"DELETE",        
                headers:{Authorization:`Bearer ${token}`}        
                });        
                const data=await res.json();        
                if(data.success){        
                loadCart();        
                }        
            }catch(err){    
            console.error(err);
            }
        }
        
        function proceedToCheckout(){        
        window.location.href="checkout.html";        
        }

</script>
</body>

</html>
